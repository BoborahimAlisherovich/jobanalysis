{% extends 'base.html' %}
{% block title %}Ro'yxatdan O'tish - AI Advisor{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-4 relative z-10 pt-10"> 
    <!-- Register Card -->
    <div class="w-full max-w-[480px] rounded-[2rem] p-10 lg:p-12 glass-panel shadow-[0_0_50px_rgba(0,0,0,0.5)] animate-slide-up relative overflow-hidden bg-background/40">
        
        <!-- Animated glow effect behind card -->
        <div class="absolute -bottom-32 -left-32 w-64 h-64 bg-accent-purple/20 rounded-full blur-[80px] pointer-events-none"></div>

        <div class="text-center mb-10 relative z-10">
            <h2 class="text-3xl font-bold text-white tracking-tight mb-3">Ro'yxatdan O'tish</h2>
            <p class="text-textSec text-[15px]">Tizimga ulanish va testdan o'tish uchun profilni to'ldiring.</p>
        </div>

        <form method="post" action="{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" class="space-y-6 relative z-10">
            {% csrf_token %}
            
            <div class="space-y-5
                [&_label]:block [&_label]:text-[13px] [&_label]:font-medium [&_label]:text-textSec [&_label]:uppercase [&_label]:tracking-wider [&_label]:mb-2
                [&_input]:block [&_input]:w-full [&_input]:px-4 [&_input]:py-4 [&_input]:bg-white/5 [&_input]:border [&_input]:border-white/10 [&_input]:rounded-2xl [&_input]:text-white [&_input]:placeholder-white/30 [&_input]:outline-none [&_input]:transition-all [&_input]:text-[15px]
                focus:[&_input]:border-accent focus:[&_input]:bg-white/10 focus:[&_input]:ring-1 focus:[&_input]:ring-accent
                [&_.errorlist]:text-red-400 [&_.errorlist]:text-[13px] [&_.errorlist]:mt-2 [&_.errorlist]:font-medium">
                {{ form.as_p }}
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 px-4 mt-8 bg-white text-background font-bold text-[16px] rounded-2xl hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] transition-all flex items-center justify-center gap-2 group overflow-hidden relative">
                Hisob yaratish va Davom etish
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
        </form>

        <p class="mt-8 text-center text-[14px] text-textSec relative z-10">
            Akkauntingiz bormi? 
            <a href="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" class="font-semibold text-white hover:text-accent transition-colors border-b border-transparent hover:border-accent pb-0.5">Kirish</a>
        </p>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const labels = document.querySelectorAll('label');
        labels.forEach(label => {
            if (label.innerText.includes("Username")) {
                label.innerText = "F.I.SH. (To'liq ismingiz)";    
            }
            if (label.innerText.includes("Password")) {
                label.innerText = "Maxfiy parol";
            }
            if (label.innerText.includes("Password confirmation")) {
                label.innerText = "Parolni tasdiqlang";
            }
            if (label.innerText.includes("Email")) {
                label.innerText = "Email (Ixtiyoriy)";
            }
        });

        const passwordInputs = document.querySelectorAll('input[type="password"]');
        passwordInputs.forEach(input => {
            const wrapper = document.createElement('div');
            wrapper.className = 'relative group';
            input.parentNode.insertBefore(wrapper, input);
            wrapper.appendChild(input);

            const iconBtn = document.createElement('button');
            iconBtn.type = 'button';
            iconBtn.className = 'absolute right-4 top-1/2 -translate-y-1/2 text-textSec hover:text-white transition-colors focus:outline-none';
            iconBtn.innerHTML = `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;

            iconBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (input.type === 'password') {
                    input.type = 'text';
                    this.innerHTML = `<svg class="w-5 h-5 text-accent-neon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>`;
                } else {
                    input.type = 'password';
                    this.innerHTML = `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;
                }
            });
            wrapper.appendChild(iconBtn);
        });

        // Hide django help text
{% endblock %}
